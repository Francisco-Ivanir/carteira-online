<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Administrativo</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.card{
    background:white;
    max-width:400px;
    margin:auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    font-size:16px;
}

</style>

</head>

<body>

<div class="card">

<h2>Login Administrativo</h2>

<input
id="usuario"
placeholder="Usuário">

<input
id="senha"
type="password"
placeholder="Senha">

<button onclick="fazerLogin()">
Entrar
</button>

</div>

<script src="login.js"></script>

</body>
</html>
